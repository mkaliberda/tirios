services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app/backend
    command: npm start
    environment:
      NODE_ENV: production
      PORT: 3001
    ports:
      - '3001:3001'

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    working_dir: /app/frontend
    command: npm start
    environment:
      NODE_ENV: development
    ports:
      - '3000:3000'
    depends_on:
      - backend
